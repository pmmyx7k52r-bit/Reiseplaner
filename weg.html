<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fernweh — Reiseplaner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

:root {
–ink: #1a1510;
–paper: #f5f0e8;
–cream: #ede8dc;
–gold: #c9a84c;
–rust: #b85c38;
–moss: #4a6741;
–slate: #5a6672;
–uap: #7b3fa0;
–lost: #8b4513;
–shadow: rgba(26,21,16,0.15);
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–paper);
color: var(–ink);
min-height: 100vh;
background-image:
radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(74,103,65,0.06) 0%, transparent 40%);
}

/* HEADER */
header {
padding: 1.5rem 1.5rem 1rem;
border-bottom: 1px solid rgba(201,168,76,0.3);
display: flex;
align-items: baseline;
gap: 1rem;
flex-wrap: wrap;
}
.logo {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
font-style: italic;
color: var(–ink);
letter-spacing: -0.02em;
}
.logo span { color: var(–gold); }
.tagline {
font-size: 0.72rem;
font-weight: 300;
color: var(–slate);
letter-spacing: 0.12em;
text-transform: uppercase;
}

/* SEARCH PANEL */
.search-panel {
max-width: 680px;
margin: 2rem auto 0;
padding: 0 1rem;
}
.search-card {
background: white;
border: 1px solid rgba(201,168,76,0.25);
border-radius: 16px;
padding: 1.5rem;
box-shadow: 0 4px 32px var(–shadow);
}
.search-card h2 {
font-family: ‘Playfair Display’, serif;
font-size: 1.25rem;
margin-bottom: 1.25rem;
}
.field-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 0.75rem;
margin-bottom: 1rem;
}
@media (max-width: 480px) { .field-row { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 0.35rem; }

label {
font-size: 0.7rem;
font-weight: 500;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–slate);
}
input[type=“text”] {
font-family: ‘DM Sans’, sans-serif;
font-size: 1rem;
padding: 0.6rem 0.85rem;
border: 1.5px solid var(–cream);
border-radius: 10px;
background: var(–paper);
color: var(–ink);
transition: border-color 0.2s;
outline: none;
-webkit-appearance: none;
}
input[type=“text”]:focus { border-color: var(–gold); background: white; }

/* FILTER CHIPS */
.filter-row {
display: flex;
gap: 0.5rem;
flex-wrap: wrap;
margin-bottom: 1.25rem;
margin-top: 0.25rem;
}
.filter-chip {
display: inline-flex;
align-items: center;
gap: 0.3rem;
padding: 0.35rem 0.7rem;
border-radius: 20px;
border: 1.5px solid var(–cream);
background: var(–paper);
cursor: pointer;
color: var(–slate);
font-family: ‘DM Sans’, sans-serif;
font-weight: 500;
transition: all 0.18s;
user-select: none;
-webkit-user-select: none;
-webkit-tap-highlight-color: transparent;
}
.filter-chip .ci { font-size: 0.95rem; line-height: 1; display: inline-block; }
.filter-chip .ct { font-size: 0.8rem; display: inline-block; }

.filter-chip.active { background: var(–gold); border-color: var(–gold); color: white; }
.filter-chip.active.c-uap { background: var(–uap); border-color: var(–uap); }
.filter-chip.active.c-lost { background: var(–lost); border-color: var(–lost); }
.filter-chip.active.c-hike { background: var(–moss); border-color: var(–moss); }
.filter-chip.active.c-natur { background: #2d8a5e; border-color: #2d8a5e; }

/* SEARCH BUTTON */
.btn-search {
width: 100%;
font-family: ‘DM Sans’, sans-serif;
font-size: 1rem;
font-weight: 500;
padding: 0.8rem;
border: none;
border-radius: 12px;
background: var(–ink);
color: var(–paper);
cursor: pointer;
letter-spacing: 0.03em;
transition: background 0.2s, color 0.2s;
-webkit-appearance: none;
}
.btn-search:hover { background: var(–gold); color: var(–ink); }
.btn-search:active { opacity: 0.85; }
.btn-search:disabled { opacity: 0.45; cursor: not-allowed; }

/* ERROR */
#error-container { max-width: 680px; margin: 0 auto; padding: 0 1rem; }
.error-box {
background: #fff5f5;
border: 1px solid #fca5a5;
border-radius: 10px;
padding: 0.85rem 1rem;
font-size: 0.85rem;
color: #991b1b;
margin-top: 0.75rem;
}

/* LOADING */
.loading { text-align: center; padding: 3rem 1rem; display: none; }
.spinner {
width: 38px; height: 38px;
border: 3px solid var(–cream);
border-top-color: var(–gold);
border-radius: 50%;
animation: spin 0.85s linear infinite;
margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 0.88rem; color: var(–slate); font-style: italic; }

/* RESULTS */
#results {
max-width: 960px;
margin: 2rem auto 1rem;
padding: 0 1rem;
display: none;
}
.results-header {
display: flex;
align-items: baseline;
justify-content: space-between;
flex-wrap: wrap;
gap: 0.5rem;
margin-bottom: 1.25rem;
}
.results-title {
font-family: ‘Playfair Display’, serif;
font-size: 1.4rem;
font-style: italic;
}
.results-meta { font-size: 0.78rem; color: var(–slate); margin-top: 0.1rem; }

.btn-save-all {
font-family: ‘DM Sans’, sans-serif;
font-size: 0.78rem;
font-weight: 500;
padding: 0.38rem 0.85rem;
border: 1.5px solid var(–gold);
border-radius: 8px;
background: transparent;
color: var(–gold);
cursor: pointer;
transition: all 0.18s;
-webkit-appearance: none;
}
.btn-save-all:hover { background: var(–gold); color: white; }

/* SPOT CARDS */
.spots-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
gap: 1rem;
}
.spot-card {
background: white;
border: 1px solid rgba(201,168,76,0.2);
border-radius: 14px;
overflow: hidden;
box-shadow: 0 2px 14px var(–shadow);
transition: transform 0.2s, box-shadow 0.2s;
position: relative;
}
.spot-card:hover { transform: translateY(-2px); box-shadow: 0 5px 24px var(–shadow); }
.spot-card.dismissed { opacity: 0.28; pointer-events: none; }
.spot-card.visited { border-color: var(–moss); }
.spot-card.visited::after {
content: ‘\2713 Besucht’;
position: absolute;
top: 0.55rem; right: 0.55rem;
background: var(–moss);
color: white;
font-size: 0.66rem;
font-weight: 600;
padding: 0.18rem 0.5rem;
border-radius: 5px;
letter-spacing: 0.04em;
}

.type-bar { height: 4px; }
.type-bar.culture { background: var(–rust); }
.type-bar.hike { background: var(–moss); }
.type-bar.lost { background: var(–lost); }
.type-bar.uap { background: var(–uap); }
.type-bar.nature { background: #2d8a5e; }
.type-bar.gold { background: var(–gold); }

.spot-body { padding: 1rem 1rem 0.75rem; }

.spot-badge {
display: inline-block;
font-size: 0.66rem;
font-weight: 600;
letter-spacing: 0.07em;
text-transform: uppercase;
padding: 0.18rem 0.5rem;
border-radius: 4px;
margin-bottom: 0.5rem;
background: var(–cream);
color: var(–slate);
}
.spot-badge.culture { background: rgba(184,92,56,0.1); color: var(–rust); }
.spot-badge.hike { background: rgba(74,103,65,0.1); color: var(–moss); }
.spot-badge.lost { background: rgba(139,69,19,0.12); color: var(–lost); }
.spot-badge.uap { background: rgba(123,63,160,0.1); color: var(–uap); }
.spot-badge.nature { background: rgba(45,138,94,0.1); color: #2d8a5e; }

.spot-name {
font-family: ‘Playfair Display’, serif;
font-size: 1.05rem;
line-height: 1.25;
margin-bottom: 0.45rem;
}
.spot-desc {
font-size: 0.82rem;
line-height: 1.55;
color: #555;
margin-bottom: 0.7rem;
}
.spot-highlight { font-size: 0.76rem; color: var(–gold); font-weight: 500; margin-bottom: 0.35rem; }
.spot-tipp { font-size: 0.74rem; color: var(–slate); font-style: italic; margin-bottom: 0.7rem; }

.spot-meta {
display: flex;
gap: 1rem;
font-size: 0.74rem;
color: var(–slate);
padding-top: 0.65rem;
border-top: 1px solid var(–cream);
flex-wrap: wrap;
}

.spot-actions {
display: flex;
gap: 0.4rem;
padding: 0.6rem 1rem;
background: var(–paper);
border-top: 1px solid var(–cream);
}
.btn-act {
flex: 1;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.74rem;
font-weight: 500;
padding: 0.42rem 0.25rem;
border-radius: 8px;
border: 1.5px solid var(–cream);
background: white;
cursor: pointer;
color: var(–slate);
transition: all 0.15s;
text-align: center;
-webkit-appearance: none;
-webkit-tap-highlight-color: transparent;
}
.btn-act:active { opacity: 0.75; }
.btn-act.save { border-color: var(–gold); color: var(–gold); }
.btn-act.save:hover,
.btn-act.save.on { background: var(–gold); color: white; border-color: var(–gold); }
.btn-act.vis { border-color: var(–moss); color: var(–moss); }
.btn-act.vis:hover,
.btn-act.vis.on { background: var(–moss); color: white; border-color: var(–moss); }
.btn-act.dis:hover { border-color: var(–rust); color: var(–rust); }

/* SAVED LIST */
.saved-section {
max-width: 960px;
margin: 0 auto 4rem;
padding: 0 1rem;
display: none;
}
.saved-section h3 {
font-family: ‘Playfair Display’, serif;
font-size: 1.1rem;
font-style: italic;
margin-bottom: 0.85rem;
}
.saved-list { display: flex; flex-direction: column; gap: 0.45rem; }
.saved-item {
display: flex;
align-items: center;
gap: 0.65rem;
background: white;
border: 1px solid var(–cream);
border-radius: 10px;
padding: 0.6rem 0.9rem;
font-size: 0.85rem;
flex-wrap: wrap;
}
.s-name { font-weight: 500; flex: 1; min-width: 100px; }
.s-type { font-size: 0.7rem; color: var(–slate); }
.s-dist { font-size: 0.7rem; color: var(–slate); }
.s-vis { font-size: 0.75rem; color: var(–moss); font-weight: 500; }
.s-del {
font-size: 0.72rem;
padding: 0.18rem 0.45rem;
border: 1px solid var(–cream);
border-radius: 5px;
background: transparent;
cursor: pointer;
color: var(–slate);
font-family: ‘DM Sans’, sans-serif;
-webkit-appearance: none;
}

.divider { height: 1px; background: var(–cream); margin: 1.5rem auto; max-width: 960px; }
</style>

</head>
<body>

<header>
<div class="logo">Fern<span>weh</span></div>
<div class="tagline">Dein pers&ouml;nlicher Reiseplaner</div>
</header>

<div class="search-panel">
<div class="search-card">
<h2>Wohin geht die Reise?</h2>

<div class="field-row">

<div class="field">
<label>Dein Heimatstandort</label>
<input type="text" id="inp-von" placeholder="z.B. Wien, M&uuml;nchen" autocomplete="off" />
</div>

<div class="filter-chip active c-hike" data-cat="wandern" data-cls="c-hike"><span class="ct">&#128692; Wandern</span></div>

<script>
/* =========================================================
KONFIGURATION
========================================================= */
var WORKER_URL = 'https://finnhub-proxy.zzbuk.workers.dev';

/* =========================================================
STATE
========================================================= */
var activeCategories = ['sehenswuerdigkeiten','wandern','lost-places','uap','natur'];
var currentSpots = [];
var savedSpots = JSON.parse(localStorage.getItem('fernweh_saved') || '[]');

/* =========================================================
TYPE CONFIG
========================================================= */
var TYPE = {
'sehenswuerdigkeiten': { label: 'Sehenswürdigkeit', bar: 'culture', badge: 'culture' },
'wandern': { label: 'Wandertipp', bar: 'hike', badge: 'hike' },
'lost-places': { label: 'Lost Place', bar: 'lost', badge: 'lost' },
'uap': { label: 'UAP-Hotspot', bar: 'uap', badge: 'uap' },
'natur': { label: 'Natur', bar: 'nature', badge: 'nature' },
'kulinarik': { label: 'Kulinarik', bar: 'gold', badge: '' }
};

/* =========================================================
FILTER CHIPS
========================================================= */
document.getElementById('filter-row').addEventListener('click', function(e) {
var chip = e.target.closest('.filter-chip');
if (!chip) return;
var cat = chip.dataset.cat;
var cls = chip.dataset.cls;
if (chip.classList.contains('active')) {
chip.classList.remove('active');
if (cls) chip.classList.remove(cls);
activeCategories = activeCategories.filter(function(c) { return c !== cat; });
} else {
chip.classList.add('active');
if (cls) chip.classList.add(cls);
activeCategories.push(cat);
}
});

/* =========================================================
LOADING TEXT ROTATION
========================================================= */
var loadingTexts = [
'Durchst\u00f6bere verlassene Orte und Wanderpfade \u2026',
'Pr\u00fcfe UAP-Sichtungsberichte und Kraftorte \u2026',
'Kalkuliere Fahrzeiten und Distanzen \u2026',
'Sammle Geheimtipps und versteckte Spots \u2026'
];
var loadingInterval;

/* =========================================================
API CALL via Cloudflare Worker
========================================================= */
function callApi(payload) {
return fetch(WORKER_URL, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(payload)
}).then(function(r) {
if (!r.ok) throw new Error('HTTP ' + r.status);
return r.json();
});
}

/* =========================================================
SEARCH
========================================================= */
function startSearch() {
var ort = document.getElementById('inp-ort').value.trim();
var standort = document.getElementById('inp-von').value.trim();
showError('');

if (!ort) { showError('Bitte einen Urlaubsort eingeben.'); return; }
if (activeCategories.length === 0) { showError('Bitte mindestens eine Kategorie w\u00e4hlen.'); return; }

document.getElementById('results').style.display = 'none';
document.getElementById('loading').style.display = 'block';
document.getElementById('btn-search').disabled = true;

var li = 0;
loadingInterval = setInterval(function() {
li = (li + 1) % loadingTexts.length;
document.getElementById('loading-text').textContent = loadingTexts[li];
}, 1900);

var catNames = activeCategories.map(function(c) {
return TYPE[c] ? TYPE[c].label : c;
}).join(', ');

var distHinweis = standort
? 'Der Nutzer reist von "' + standort + '". Sch\u00e4tze Distanz (km) und Autofahrtzeit (Minuten) von dort zu jedem Spot.'
: 'Standort unbekannt \u2013 sch\u00e4tze Distanz (km) und Fahrzeit (min) vom Zentrum des Urlaubsorts.';

var system = 'Du bist ein erfahrener Reiseguide und Geheimtipp-Experte. WICHTIG: Antworte AUSSCHLIESSLICH mit reinem JSON. KEINE Markdown-Backticks (kein ```json), KEIN Text vor oder nach dem JSON. Nur das rohe JSON-Objekt, beginnend mit { und endend mit }.';

var prompt =
'Erstelle 8 bis 12 interessante Reise-Spots f\u00fcr das Ziel: "' + ort + '".\n\n' +
'Gew\u00fcnschte Kategorien: ' + catNames + '\n\n' + distHinweis + '\n\n' +
'Richtlinien:\n' +
'- Lost Places: echte oder sehr plausible verlassene Orte (Fabriken, Sanatorien, Kasernen, Hotels, Kirchen). Geschichte + Mythos + Zugangshinweis.\n' +
'- UAP-Hotspots: dokumentierte oder legend\u00e4re UFO/UAP-Sichtungen, Kraftorte, Ley-Linien. Sichtungsgeschichte + atmosph\u00e4rische Beschreibung.\n' +
'- Wandern: konkreter Trail/Route, L\u00e4nge (km), H\u00f6henmeter, Schwierigkeitsgrad (leicht/mittel/schwer), Highlights.\n' +
'- Sehenswürdigkeiten: kulturell oder historisch bedeutsam, kurze Geschichte.\n' +
'- Natur: besondere Landschaft, Geologie, Flora/Fauna.\n' +
'- Kulinarik: lokale Spezialit\u00e4t oder Restaurant-Empfehlung mit kurzem Kontext.\n\n' +
'Gib als Antwort NUR dieses JSON zur\u00fcck (keine weiteren Texte):\n' +
'{"destination":"Name des Reiseziels","spots":[{"id":"s1","name":"Ortsname","type":"lost-places","description":"2-4 S\u00e4tze","distanz_km":25,"fahrzeit_min":30,"besonderheit":"Ein pr\u00e4gnanter Highlight-Satz","tipp":"Praktischer Hinweis"}]}';

callApi({
model: 'claude-haiku-4-5-20251001',
max_tokens: 2500,
system: system,
messages: [{ role: 'user', content: prompt }]
})
.then(function(data) {
clearInterval(loadingInterval);
document.getElementById('loading').style.display = 'none';
document.getElementById('btn-search').disabled = false;

if (data.error) {
showError('API-Fehler: ' + (data.error.message || JSON.stringify(data.error)));
return;
}

// Rohtext aus verschiedenen Antwortstrukturen holen
var raw = '';
if (data.content && data.content[0] && data.content[0].text) {
raw = data.content[0].text;
} else if (typeof data === 'string') {
raw = data;
} else if (data.text) {
raw = data.text;
} else if (data.completion) {
raw = data.completion;
}

// Robustes JSON-Extrahieren: { ... } herausschneiden
var jStart = raw.indexOf('{');
var jEnd = raw.lastIndexOf('}');
if (jStart >= 0 && jEnd > jStart) {
raw = raw.substring(jStart, jEnd + 1);
} else {
raw = raw.replace(/```json/gi, '').replace(/```/g, '').trim();
}

var parsed;
try { parsed = JSON.parse(raw); }
catch(e) {
showError('JSON-Fehler: ' + e.message + ' | Rohtext: ' + (raw || JSON.stringify(data)).substring(0, 150));
return;
}

currentSpots = parsed.spots || [];
renderResults(parsed.destination || ort, standort);
})
.catch(function(e) {
clearInterval(loadingInterval);
document.getElementById('loading').style.display = 'none';
document.getElementById('btn-search').disabled = false;
showError('Verbindungsfehler: ' + (e.message || 'Unbekannt'));
});
}

/* =========================================================
RENDER RESULTS
========================================================= */
function renderResults(destination, standort) {
var grid = document.getElementById('spots-grid');
grid.innerHTML = '';

document.getElementById('results-title').textContent = destination;
var meta = currentSpots.length + ' Spots gefunden';
if (standort) meta += ' \u00b7 Fahrzeiten ab ' + standort;
document.getElementById('results-meta').textContent = meta;
document.getElementById('results').style.display = 'block';

currentSpots.forEach(function(spot) {
grid.appendChild(buildCard(spot));
});

renderSaved();
}

/* =========================================================
BUILD CARD
========================================================= */
function buildCard(spot) {
var cfg = TYPE[spot.type] || { label: spot.type, bar: 'gold', badge: '' };
var isSaved = savedSpots.some(function(s) { return s.id === spot.id; });
var isVisited = savedSpots.some(function(s) { return s.id === spot.id && s.visited; });

var fz = (spot.fahrzeit_min || 0) < 60
? (spot.fahrzeit_min || '?') + ' Min.'
: Math.floor(spot.fahrzeit_min / 60) + 'h ' + (spot.fahrzeit_min % 60 ? (spot.fahrzeit_min % 60) + 'min' : '');

var card = document.createElement('div');
card.className = 'spot-card' + (isVisited ? ' visited' : '');
card.id = 'card-' + spot.id;

card.innerHTML =
'<div class="type-bar ' + cfg.bar + '"></div>' +
'<div class="spot-body">' +
'<span class="spot-badge ' + cfg.badge + '">' + esc(cfg.label) + '</span>' +
'<div class="spot-name">' + esc(spot.name) + '</div>' +
'<div class="spot-desc">' + esc(spot.description) + '</div>' +
(spot.besonderheit ? '<div class="spot-highlight">&#10022;&nbsp;' + esc(spot.besonderheit) + '</div>' : '') +
(spot.tipp ? '<div class="spot-tipp">&#128161;&nbsp;' + esc(spot.tipp) + '</div>' : '') +
'<div class="spot-meta">' +
'<span>&#128205;&nbsp;' + (spot.distanz_km || '?') + ' km</span>' +
'<span>&#128663;&nbsp;ca. ' + fz + '</span>' +
'</div>' +
'</div>' +
'<div class="spot-actions">' +
'<button type="button" class="btn-act save ' + (isSaved ? 'on' : '') + '" id="bs-' + spot.id + '" onclick="toggleSave(\'' + spot.id + '\')">' + (isSaved ? '\u2713 Gespeichert' : '+ Speichern') + '</button>' +
'<button type="button" class="btn-act vis ' + (isVisited ? 'on' : '') + '" id="bv-' + spot.id + '" onclick="toggleVisited(\'' + spot.id + '\')">' + (isVisited ? '\u2713 Besucht' : '&#128506; Besucht?') + '</button>' +
'<button type="button" class="btn-act dis" onclick="dismissCard(\'' + spot.id + '\')">\u2715</button>' +
'</div>';

return card;
}

function esc(str) {
if (!str) return '';
return String(str)
.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =========================================================
CARD ACTIONS
========================================================= */
function toggleSave(id) {
var spot = currentSpots.find(function(s) { return s.id === id; });
if (!spot) return;
var idx = savedSpots.findIndex(function(s) { return s.id === id; });
if (idx >= 0) savedSpots.splice(idx, 1);
else savedSpots.push({ id: spot.id, name: spot.name, type: spot.type, visited: false, distanz_km: spot.distanz_km });
persist(); refreshCard(id); renderSaved();
}

function toggleVisited(id) {
var spot = currentSpots.find(function(s) { return s.id === id; });
if (!spot) return;
var saved = savedSpots.find(function(s) { return s.id === id; });
if (!saved) savedSpots.push({ id: spot.id, name: spot.name, type: spot.type, visited: true, distanz_km: spot.distanz_km });
else saved.visited = !saved.visited;
persist(); refreshCard(id); renderSaved();
}

function dismissCard(id) {
var card = document.getElementById('card-' + id);
if (!card) return;
card.style.transition = 'opacity 0.25s';
card.style.opacity = '0';
setTimeout(function() { card.classList.add('dismissed'); card.style.opacity = ''; }, 260);
}

function saveAll() {
currentSpots.forEach(function(spot) {
if (!savedSpots.find(function(s) { return s.id === spot.id; })) {
savedSpots.push({ id: spot.id, name: spot.name, type: spot.type, visited: false, distanz_km: spot.distanz_km });
}
});
persist();
currentSpots.forEach(function(spot) { refreshCard(spot.id); });
renderSaved();
}

function refreshCard(id) {
var isSaved = savedSpots.some(function(s) { return s.id === id; });
var isVisited = savedSpots.some(function(s) { return s.id === id && s.visited; });
var card = document.getElementById('card-' + id);
if (card) { if (isVisited) card.classList.add('visited'); else card.classList.remove('visited'); }
var bs = document.getElementById('bs-' + id);
if (bs) { bs.textContent = isSaved ? '\u2713 Gespeichert' : '+ Speichern'; if (isSaved) bs.classList.add('on'); else bs.classList.remove('on'); }
var bv = document.getElementById('bv-' + id);
if (bv) { bv.innerHTML = isVisited ? '\u2713 Besucht' : '&#128506; Besucht?'; if (isVisited) bv.classList.add('on'); else bv.classList.remove('on'); }
}

/* =========================================================
SAVED LIST
========================================================= */
function renderSaved() {
var list = document.getElementById('saved-list');
var section = document.getElementById('saved-section');
var divider = document.getElementById('saved-divider');
list.innerHTML = '';

if (savedSpots.length === 0) {
section.style.display = 'none';
divider.style.display = 'none';
return;
}
section.style.display = 'block';
divider.style.display = 'block';

savedSpots.forEach(function(s) {
var cfg = TYPE[s.type] || { label: s.type };
var item = document.createElement('div');
item.className = 'saved-item';
item.innerHTML =
'<span class="s-name">' + esc(s.name) + '</span>' +
'<span class="s-type">' + esc(cfg.label) + '</span>' +
(s.distanz_km ? '<span class="s-dist">&#128205;&nbsp;' + s.distanz_km + ' km</span>' : '') +
(s.visited ? '<span class="s-vis">\u2713 besucht</span>' : '') +
'<button class="s-del" type="button" onclick="removeSaved(\'' + s.id + '\')">\u2715</button>';
list.appendChild(item);
});
}

function removeSaved(id) {
savedSpots = savedSpots.filter(function(s) { return s.id !== id; });
persist(); refreshCard(id); renderSaved();
}

function persist() {
localStorage.setItem('fernweh_saved', JSON.stringify(savedSpots));
}

/* =========================================================
HELPERS
========================================================= */
function showError(msg) {
document.getElementById('error-container').innerHTML =
msg ? '<div class="error-box">' + msg + '</div>' : '';
}

document.addEventListener('keydown', function(e) {
if (e.key === 'Enter') startSearch();
});

renderSaved();
</script>

</body>
</html>
